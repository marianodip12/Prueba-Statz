<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- StatzPro — barras de stats + pelota de handball en trayectoria -->
  <defs>
    <linearGradient id="spBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="spBarHot" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#00E5C4"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0B1F3A"/>
  <!-- Barras ascendentes -->
  <rect x="9"  y="44" width="9" height="12" rx="2.5" fill="url(#spBar)" opacity="0.45"/>
  <rect x="22" y="35" width="9" height="21" rx="2.5" fill="url(#spBar)" opacity="0.7"/>
  <rect x="35" y="25" width="9" height="31" rx="2.5" fill="url(#spBar)"/>
  <rect x="48" y="14" width="9" height="42" rx="2.5" fill="url(#spBarHot)"/>
  <!-- Trayectoria del tiro -->
  <path d="M 10 38 Q 26 10 44 13" fill="none" stroke="#F59E0B" stroke-width="2.4"
        stroke-linecap="round" stroke-dasharray="1 5" opacity="0.85"/>
  <!-- Pelota de handball -->
  <circle cx="48" cy="12" r="6.5" fill="#F59E0B"/>
  <path d="M 43.5 9.5 Q 48 13.5 52.5 9.5 M 44 15.5 Q 48 11.5 52 15.5"
        fill="none" stroke="#0B1F3A" stroke-width="1.3" stroke-linecap="round"/>
</svg>
